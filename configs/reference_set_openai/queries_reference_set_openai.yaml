name: reference_set_openai
description: |
  OpenAI reference-set experiment matrix for comparing current text models on
  the MHS reference set. This focuses on text-capable models that fit the
  comment-rating workflow in this repository, and sweeps reasoning levels for
  the current GPT-5.4 and GPT-5.2 families.

subset: reference_set

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

models:
  - id: openai_gpt-5.4_none
    provider: openai
    name: gpt-5.4
    max_tokens: 2000
    reasoning:
      effort: none

  - id: openai_gpt-5.4_low
    provider: openai
    name: gpt-5.4
    max_tokens: 2000
    reasoning:
      effort: low

  - id: openai_gpt-5.4_medium
    provider: openai
    name: gpt-5.4
    max_tokens: 2000
    reasoning:
      effort: medium

  - id: openai_gpt-5.4_high
    provider: openai
    name: gpt-5.4
    max_tokens: 8000
    reasoning:
      effort: high

  - id: openai_gpt-5.4_xhigh
    provider: openai
    name: gpt-5.4
    max_tokens: 10000
    reasoning:
      effort: xhigh

  - id: openai_gpt-5.2_none
    provider: openai
    name: gpt-5.2
    max_tokens: 2000
    reasoning:
      effort: none

  - id: openai_gpt-5.2_low
    provider: openai
    name: gpt-5.2
    max_tokens: 2000
    reasoning:
      effort: low

  - id: openai_gpt-5.2_medium
