    name: gpt-5.2
    max_tokens: 2000
    reasoning:
      effort: medium

  - id: openai_gpt-5.2_high
    provider: openai
    name: gpt-5.2
    max_tokens: 8000
    reasoning:
      effort: high

  - id: openai_gpt-5.2_xhigh
    provider: openai
    name: gpt-5.2
    max_tokens: 10000
    reasoning:
      effort: xhigh

  - id: openai_gpt-5.4-mini_none
    provider: openai
    name: gpt-5.4-mini
    max_tokens: 2000
    reasoning:
      effort: none

  - id: openai_gpt-5.4-mini_low
    provider: openai
    name: gpt-5.4-mini
    max_tokens: 2000
    reasoning:
      effort: low

  - id: openai_gpt-5.4-mini_medium
    provider: openai
    name: gpt-5.4-mini
