annotations:
  paths:
    - data/full_set_all_models_processed.csv

scoring:
  recode_like_humans: true

output:
  facets_run_dir: facets/full_set_all_models_llm_only_recoded
  facets_data_filename: full_set_all_models_llm_only_recoded_data.tsv
  facets_spec_filename: full_set_all_models_llm_only_recoded_spec.txt
  facets_score_filename: full_set_all_models_llm_only_recoded_scores.txt
  facets_output_filename: full_set_all_models_llm_only_recoded_output.txt

facets:
  title: MHS Full Set All Models LLM-Only Recoded Scale
  model: "?, ?, #, R"
  noncenter: 1
  positive: 1
  arrange: N
  subset_detection: No
  delements:
    - 1N
    - 2N
    - 3N
  csv: Tab
