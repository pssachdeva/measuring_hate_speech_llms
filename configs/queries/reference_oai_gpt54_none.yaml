name: openai_gpt-5.4_none
description: |
  Initial experiment on OpenAI's GPT-5.4 using the reference set in MHS corpus
  with a small test limit.

subset: reference_set

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

model:
  provider: openai
  name: gpt-5.4
  id: openai_gpt-5.4_none
  max_tokens: 1000
  reasoning:
    effort: none

batches:
  run_dir: batches/openai_gpt-5.4_none
