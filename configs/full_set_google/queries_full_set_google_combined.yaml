name: full_set_google_combined
description: |
  Gemini 3.1 Pro preview medium annotation rerun for MHS comments with 4 to 7
  human annotators, combining the earlier split full-set Google configs into
  one clean batch run.

subset:
  type: annotator_count_threshold
  min: 4
  max: 7

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

model:
  id: google_gemini-3.1-pro-preview_medium
  provider: google
  name: gemini-3.1-pro-preview
  max_tokens: 2048
  reasoning:
    effort: medium

batches:
  run_dir: batches/full_set_google_combined
  combined_output_path: data/full_set_google_combined_processed.csv
