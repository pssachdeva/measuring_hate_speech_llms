name: full_set_google_2
description: |
  Gemini 3.1 Pro preview medium annotation run for MHS comments with exactly 4
  human annotators.

subset:
  type: annotator_count_threshold
  min: 4
  max: 4

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

model:
  id: google_gemini-3.1-pro-preview_medium
  provider: google
  name: gemini-3.1-pro-preview
  max_tokens: 2048
  reasoning:
    effort: medium

batches:
  run_dir: batches/full_set_google_2
  combined_output_path: data/full_set_google_processed_2.csv
