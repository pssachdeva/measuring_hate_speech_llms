name: question_order_reverse_secondary_batch
description: |
  Reverse severity-item order run on the MHS reference set for secondary models.

subset: reference_set

prompt:
  system_prompt_path: prompts/mhs_survey_v1_reversed_severity_order.txt

models:
  - id: openai_gpt-4o
    provider: openai
    name: gpt-4o
    max_tokens: 2000

  - id: openai_gpt-4.1
    provider: openai
    name: gpt-4.1
    max_tokens: 2000

  - id: xai_grok-3
    provider: xai
    name: grok-3
    max_tokens: 2048

  - id: google_gemini-2.5-pro
    provider: google
    name: gemini-2.5-pro
    max_tokens: 2048

  - id: anthropic_claude-sonnet-4-6_medium
    provider: anthropic
    name: claude-sonnet-4-6
    max_tokens: 2048
    reasoning:
      effort: medium

  - id: anthropic_claude-opus-4-5_medium
    provider: anthropic
    name: claude-opus-4-5-20251101
    max_tokens: 2048
    reasoning:
      effort: medium

batches:
  run_dir: batches/question_order_reverse_secondary_batch
  combined_output_path: data/question_order_reverse_secondary_batch_processed.csv
