name: full_set_deepseek-v4-pro
description: |
  DeepSeek direct streaming full-set run for DeepSeek V4 Pro on MHS comments
  with 4+ human annotators.

subset:
  type: annotator_count_threshold
  min: 4

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

async:
  max_attempts: 2
  retry_delay_seconds: 2.0
  concurrency: 6

model:
  id: deepseek_deepseek-v4-pro
  provider: deepseek
  name: deepseek-v4-pro
  max_tokens: 4096
  reasoning:
    effort: high
  params:
    thinking:
      type: enabled
    response_format:
      type: json_object
    stream_options:
      include_usage: true

batches:
  run_dir: batches/full_set_deepseek-v4-pro
  combined_output_path: data/full_set_deepseek-v4-pro_processed.csv
