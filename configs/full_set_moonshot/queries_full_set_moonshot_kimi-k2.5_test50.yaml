name: full_set_moonshot_kimi-k2.5_test50
description: |
  Moonshot/Kimi direct Batch API smoke test for Kimi K2.5 on 50 MHS comments
  with 4+ human annotators.

subset:
  type: annotator_count_threshold
  min: 4

limit: 50

prompt:
  system_prompt_path: prompts/mhs_survey_v1.txt

model:
  id: moonshot_kimi-k2.5
  provider: moonshot
  name: kimi-k2.5
  max_tokens: 4096
  params:
    thinking:
      type: enabled

batches:
  run_dir: batches/full_set_moonshot_kimi-k2.5_test50
  combined_output_path: data/full_set_moonshot_kimi-k2.5_test50_processed.csv
